<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Personal — staff lines with piano keyboard">
  <!-- chassis (matches wet/dry lab marks): slate-blue outline + white interior -->
  <path d="M 19 5 L 81 5 A 14 14 0 0 1 95 19 L 95 81 A 14 14 0 0 1 81 95 L 19 95 A 14 14 0 0 1 5 81 L 5 19 A 14 14 0 0 1 19 5 Z"
        stroke="#355a85" stroke-width="9" fill="#ffffff" stroke-linejoin="miter"/>
  <!-- piano + staff contents, scaled into the chassis interior (x=10..90, y=10..90) -->
  <g transform="translate(10 10) scale(0.8)">
    <!-- staff lines -->
    <g stroke="#355a85" stroke-width="2.5" stroke-linecap="round">
      <line x1="10" y1="16" x2="90" y2="16"/>
      <line x1="10" y1="24" x2="90" y2="24"/>
      <line x1="10" y1="32" x2="90" y2="32"/>
      <line x1="10" y1="40" x2="90" y2="40"/>
      <line x1="10" y1="48" x2="90" y2="48"/>
    </g>
    <!-- noteheads -->
    <g fill="#355a85">
      <ellipse cx="28" cy="40" rx="5" ry="3.5" transform="rotate(-22 28 40)"/>
      <ellipse cx="50" cy="32" rx="5" ry="3.5" transform="rotate(-22 50 32)"/>
      <ellipse cx="72" cy="24" rx="5" ry="3.5" transform="rotate(-22 72 24)"/>
    </g>
    <!-- stems -->
    <g stroke="#355a85" stroke-width="2" stroke-linecap="round">
      <line x1="32" y1="38" x2="32" y2="18"/>
      <line x1="54" y1="30" x2="54" y2="10"/>
      <line x1="76" y1="22" x2="76" y2="6"/>
    </g>
    <!-- piano body -->
    <rect x="6" y="60" width="88" height="32" rx="2" stroke="#355a85" stroke-width="4" fill="none"/>
    <!-- white-key dividers -->
    <g stroke="#355a85" stroke-width="2.5" stroke-linecap="round">
      <line x1="18.57" y1="62" x2="18.57" y2="92"/>
      <line x1="31.14" y1="62" x2="31.14" y2="92"/>
      <line x1="43.71" y1="62" x2="43.71" y2="92"/>
      <line x1="56.29" y1="62" x2="56.29" y2="92"/>
      <line x1="68.86" y1="62" x2="68.86" y2="92"/>
      <line x1="81.43" y1="62" x2="81.43" y2="92"/>
    </g>
    <!-- black keys -->
    <g fill="#355a85">
      <rect x="14.07" y="62" width="9" height="14" rx="1"/>
      <rect x="26.64" y="62" width="9" height="14" rx="1"/>
      <rect x="51.79" y="62" width="9" height="14" rx="1"/>
      <rect x="64.36" y="62" width="9" height="14" rx="1"/>
      <rect x="76.93" y="62" width="9" height="14" rx="1"/>
    </g>
  </g>
</svg>
