<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Personal — field cannon on wheel">
  <!-- chassis (matches lab marks): slate-blue outline + white interior -->
  <path d="M 19 5 L 81 5 A 14 14 0 0 1 95 19 L 95 81 A 14 14 0 0 1 81 95 L 19 95 A 14 14 0 0 1 5 81 L 5 19 A 14 14 0 0 1 19 5 Z"
        stroke="#355a85" stroke-width="9" fill="#ffffff" stroke-linejoin="miter"/>
  <!-- trail (single stroked line; drawn first so the wheel renders on top of it) -->
  <line x1="30" y1="72" x2="14" y2="86"
        stroke="#355a85" stroke-width="5" stroke-linecap="round"/>
  <!-- wheel -->
  <circle cx="34" cy="62" r="18" fill="none" stroke="#355a85" stroke-width="6"/>
  <!-- 4 spokes -->
  <g stroke="#355a85" stroke-width="5" stroke-linecap="round">
    <line x1="34" y1="44" x2="34" y2="80"/>
    <line x1="16" y1="62" x2="52" y2="62"/>
    <line x1="21.27" y1="49.27" x2="46.73" y2="74.73"/>
    <line x1="21.27" y1="74.73" x2="46.73" y2="49.27"/>
  </g>
  <!-- hub (small filled accent at wheel center) -->
  <circle cx="34" cy="62" r="4" fill="#355a85"/>
  <!-- barrel (parallelogram outline) -->
  <path d="M 30 48 L 80 32 L 84 40 L 34 56 Z"
        fill="none" stroke="#355a85" stroke-width="6"
        stroke-linejoin="round" stroke-linecap="round"/>
</svg>
